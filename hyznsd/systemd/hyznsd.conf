# /etc/hyznsd.conf - deployment config for the systemd service.
# Same keys as hyznsd.conf.example. `logfile` is intentionally left UNSET so
# hyznsd logs to stderr -> journald (journalctl -u hyznsd). All values in ZONES.

dm        = hyzns0
backing   = /dev/nvme0n1
fs        = f2fs                # f2fs | zenfs
mnt       = /mnt/aux           # F2FS mount (resize ioctl fd source)
aux       = /mnt/aux           # ZenFS aux dir (.hyzns_status / .hyzns_resize) if fs=zenfs
f2fs_io   = /usr/local/sbin/f2fs_io   # MUST be the patched build (has resize_cns)
rz_source = report             # report | fs

poll_ms     = 500
poll_min_ms = 100              # fast poll under pressure (R_C <= grow_floor*2)
grow_floor   = 2
grow_guard   = 2
shrink_hi    = 4
shrink_guard = 1
step         = 2
step_max     = 8
r_min        = 4
r_max        = 64
cooldown_ms    = 2000
backoff_ms     = 1000
backoff_max_ms = 30000
ack_timeout_ms = 60000
# logfile =                    # leave unset -> stderr -> journald
