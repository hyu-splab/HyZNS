# hyznsd.conf - runtime policy configuration (key=value, '#' comments).
# Load with `hyznsd -c hyznsd.conf`.
# Precedence: built-in defaults < this file < --set overrides.
# Values are parsed at runtime; no rebuild needed. Compile-time dm-side knobs
# are listed at the bottom for reference.
#
# Policy = FTR (paper 5.6.3):
#   grow +1 iff R_C<ftr_grow_rc*S_Z && R_Z>=ftr_grow_rz
#   shrink -1 iff R_C>ftr_shrink_rc*S_Z && R_Z<ftr_shrink_rz
# R_C = dm free_pages (real free blocks), R_Z = free ZNS zones, S_Z = zone size.

########## FTR thresholds (paper defaults 2/5/3/4, administrator-configurable) ##########
ftr_grow_rc=2      # grow: R_C < this * S_Z (free blocks, in zones)
ftr_grow_rz=5      # grow: ... && R_Z >= this (ZNS free-zone guard)
ftr_shrink_rc=3    # shrink: R_C > this * S_Z
ftr_shrink_rz=4    # shrink: ... && R_Z < this

########## gc_urgent switches ##########
ftr_gcu_resize=1   # 1: gc_urgent ON while a grow/shrink fires, flushing delayed
                   #    discards before ResizeCNS (its checkpoint completes them)
ftr_gcu_park=0     # 1: gc_urgent ON while dm GC is parked (victims ~fully valid).
                   #    Rarely needed for R<=16GB (SSR): in-place reuse already
                   #    supplies invalid blocks.

########## R_Z source ##########
rz_source=fs       # fs: query the zone-aware FS (ZenFS .hyzns_status free_zones)
                   # report: count EMPTY zones in [ABA, s_end_zone) via blkzone
                   #   (automatic fallback when the fs status file is absent)
                   # s_end_zone: exclusive upper bound for report mode, in zones.
                   #   On a shared device set it to this instance's S-region end,
                   #   or R_Z counts the other instance's zones. 0 = device end.

########## resize execution ##########
r_min=4            # shrink clamp
r_max=64           # grow clamp
cooldown_ms=3000   # min gap between successful resizes
backoff_ms=1000    # initial backoff after a failed resize
backoff_max_ms=30000
ack_timeout_ms=60000   # ZenFS resize ack wait

########## monitor loop ##########
poll_ms=300        # idle poll period
poll_min_ms=100    # poll period while R_C is under pressure (<= 2*ftr_grow_rc zones)

########## [reference] compile-time dm-side knobs (dm-hyzns/dm-hyzns.c #define) ##########
# HYZNS_GC_VICTIM_MAX_VPC (95)  : park GC when the victim's valid% is above this
# hyzns_set_watermarks          : GC trigger = ceil(R/4) free lines, one line at a time
# HYZNS_GC_BATCH_DEFAULT (256)  : GC migrate batch (runtime: dmsetup message gc_batch N)
# HYZNS_GC_BATCH_SHRINK (128)   : batch during shrink (runtime: gc_batch_shrink N)
# map() growable-wait            : 60s killable wait, then ENOSPC
# After changing these, rebuild daemon + module with ./build.sh and reload the module.
